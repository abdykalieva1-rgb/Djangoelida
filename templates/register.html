<!<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Регистрация</title>

<style>
body {
    margin: 0;
    padding: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #1e1e2f, #3a3a5a);
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* стеклянный эффект */
.form-container {
    background: rgba(255, 255, 255, 0.05);
    backdrop-filter: blur(15px);
    padding: 40px;
    border-radius: 15px;
    width: 350px;
    color: white;
    box-shadow: 0 0 30px rgba(0,0,0,0.3);
}

.form-container h2 {
    text-align: center;
    margin-bottom: 25px;
}

/* input */
.input-group {
    position: relative;
    margin-bottom: 20px;
}

.input-group input {
    width: 100%;
    padding: 12px;
    border: none;
    outline: none;
    border-radius: 8px;
    background: rgba(255,255,255,0.1);
    color: white;
}

.input-group label {
    position: absolute;
    left: 12px;
    top: 12px;
    font-size: 14px;
    color: #aaa;
    transition: 0.3s;
}

.input-group input:focus + label,
.input-group input:valid + label {
    top: -10px;
    font-size: 12px;
    color: #00c6ff;
}

/* кнопка */
button {
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 8px;
    background: linear-gradient(135deg, #00c6ff, #0072ff);
    color: white;
    font-weight: bold;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    transform: scale(1.05);
}

/* ссылка назад */
.back {
    display: block;
    text-align: center;
    margin-top: 15px;
    color: #aaa;
    text-decoration: none;
}

.back:hover {
    color: white;
}

</style>
</head>

<body>

<div class="form-container">
    <h2>Регистрация</h2>

    <form method="post">
        {% csrf_token %}

        <div class="input-group">
            <input type="text" name="username" required>
            <label>Имя пользователя</label>
        </div>

        <div class="input-group">
            <input type="email" name="email" required>
            <label>Email</label>
        </div>

        <div class="input-group">
            <input type="password" name="password" required>
            <label>Пароль</label>
        </div>

        <button type="submit">Создать аккаунт</button>
    </form>

    <a href="{% url 'next_to_page' %}" class="back">← Назад</a>
</div>

</body>
</html>
